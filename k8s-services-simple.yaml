---
# Simple mock services with chaos injection capability
# These use the chaos-service image for controlled failure scenarios

---
# Gateway Deployment (chaos-enabled service)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: loadgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      containers:
      - name: gateway
        image: chaos-service:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: SERVICE_NAME
          value: "gateway"
        livenessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: loadgen
spec:
  selector:
    app: gateway
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080

