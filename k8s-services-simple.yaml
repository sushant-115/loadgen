---
# This pod continuously sends OTEL telemetry to the collector
apiVersion: v1
kind: ConfigMap
metadata:
  name: load-generator-script
  namespace: loadgen
data:
  generator.py: |
    #!/usr/bin/env python3
    import random
    import time
    import json
    import threading
    from urllib.request import urlopen, Request
    from urllib.error import URLError

    OTEL_ENDPOINT = "http://otel-collector.loadgen.svc.cluster.local:4318"
    SERVICES = ["gateway", "auth-service", "user-service", "order-service", "payment-service", "notification-worker"]
    METRICS = ["http_request_duration_seconds", "http_requests_total", "db_query_duration_seconds", "cache_hit_ratio", "error_rate", "cpu_usage_percent", "memory_usage_mb"]

    # Track chaos state per service
    chaos_state = {}
    chaos_lock = threading.Lock()

    def check_chaos_status():
        """Poll each service's /chaos/status endpoint every 5 seconds"""
        while True:
            for svc in SERVICES:
                try:
                    url = f"http://{svc}.loadgen.svc.cluster.local:8080/chaos/status"
                    req = Request(url, method="GET")
                    with urlopen(req, timeout=2) as resp:
                        data = json.loads(resp.read().decode())
                        with chaos_lock:
                            chaos_state[svc] = data
                except Exception:
                    pass
            time.sleep(5)

    def get_chaos_for_service(service):
        """Get the current chaos config for a service"""
        with chaos_lock:
            state = chaos_state.get(service, {})
        if state.get("active", False):
            return state.get("type", ""), state.get("intensity", 0)
        return None, 0

    def generate_value(service, metric_name):
        """Generate metric value, amplified when chaos is active"""
        chaos_type, intensity = get_chaos_for_service(service)

        # Normal baseline values (tight range for stable baseline)
        baselines = {
            "http_request_duration_seconds": (0.05, 0.3),
            "http_requests_total": (100, 500),
            "db_query_duration_seconds": (0.01, 0.1),
            "cache_hit_ratio": (0.85, 0.99),
            "error_rate": (0.001, 0.02),
            "cpu_usage_percent": (10, 40),
            "memory_usage_mb": (200, 500),
        }

        low, high = baselines.get(metric_name, (0.1, 1.0))
        value = random.uniform(low, high)

        if chaos_type is None:
            return value

        # Chaos is active - ALL metrics shift dramatically to affect embeddings
        factor = intensity / 100.0  # 0.0 to 1.0

        # Universal chaos effects (affect ALL metrics to shift embedding vector)
        chaos_multipliers = {
            "latency": {
                "http_request_duration_seconds": lambda v, f: random.uniform(5.0, 30.0) * f,
                "http_requests_total": lambda v, f: v * (0.1 + 0.2 * (1-f)),
                "db_query_duration_seconds": lambda v, f: random.uniform(2.0, 15.0) * f,
                "cache_hit_ratio": lambda v, f: random.uniform(0.1, 0.4) * (1-f) + 0.05,
                "error_rate": lambda v, f: random.uniform(0.1, 0.5) * f,
                "cpu_usage_percent": lambda v, f: random.uniform(60, 95) * f,
                "memory_usage_mb": lambda v, f: random.uniform(800, 2000) * f,
            },
            "errors": {
                "http_request_duration_seconds": lambda v, f: random.uniform(3.0, 20.0) * f,
                "http_requests_total": lambda v, f: v * (0.2 + 0.3 * (1-f)),
                "db_query_duration_seconds": lambda v, f: random.uniform(1.0, 8.0) * f,
                "cache_hit_ratio": lambda v, f: random.uniform(0.05, 0.3),
                "error_rate": lambda v, f: random.uniform(0.3, 0.95) * f,
                "cpu_usage_percent": lambda v, f: random.uniform(70, 99) * f,
                "memory_usage_mb": lambda v, f: random.uniform(1000, 3000) * f,
            },
            "cpu": {
                "http_request_duration_seconds": lambda v, f: random.uniform(2.0, 10.0) * f,
                "http_requests_total": lambda v, f: v * (0.3 + 0.3 * (1-f)),
                "db_query_duration_seconds": lambda v, f: random.uniform(0.5, 5.0) * f,
                "cache_hit_ratio": lambda v, f: random.uniform(0.2, 0.5),
                "error_rate": lambda v, f: random.uniform(0.05, 0.3) * f,
                "cpu_usage_percent": lambda v, f: random.uniform(85, 100),
                "memory_usage_mb": lambda v, f: random.uniform(600, 1500) * f,
            },
            "memory": {
                "http_request_duration_seconds": lambda v, f: random.uniform(1.0, 8.0) * f,
                "http_requests_total": lambda v, f: v * (0.4 + 0.3 * (1-f)),
                "db_query_duration_seconds": lambda v, f: random.uniform(0.3, 3.0) * f,
                "cache_hit_ratio": lambda v, f: random.uniform(0.3, 0.6),
                "error_rate": lambda v, f: random.uniform(0.02, 0.2) * f,
                "cpu_usage_percent": lambda v, f: random.uniform(50, 85) * f,
                "memory_usage_mb": lambda v, f: random.uniform(2000, 4000),
            },
        }

        type_map = chaos_multipliers.get(chaos_type, {})
        if metric_name in type_map:
            value = type_map[metric_name](value, factor)

        return round(value, 6)

    def send_metric(service, metric_name, value):
        """Send OTLP metric to collector"""
        payload = {
            "resourceMetrics": [{
                "resource": {
                    "attributes": [
                        {"key": "service.name", "value": {"stringValue": service}},
                        {"key": "service_id", "value": {"stringValue": service}},
                        {"key": "environment", "value": {"stringValue": "production"}}
                    ]
                },
                "scopeMetrics": [{
                    "metrics": [{
                        "name": metric_name,
                        "gauge": {
                            "dataPoints": [{
                                "attributes": [
                                    {"key": "service_id", "value": {"stringValue": service}},
                                    {"key": "environment", "value": {"stringValue": "production"}}
                                ],
                                "timeUnixNano": str(int(time.time() * 1e9)),
                                "asDouble": value
                            }]
                        }
                    }]
                }]
            }]
        }
        try:
            data = json.dumps(payload).encode('utf-8')
            req = Request(f"{OTEL_ENDPOINT}/v1/metrics", data=data, headers={"Content-Type": "application/json"}, method="POST")
            with urlopen(req, timeout=5) as response:
                pass
        except URLError as e:
            pass

    def generator_thread():
        """Continuously generate telemetry"""
        while True:
            service = random.choice(SERVICES)
            metric = random.choice(METRICS)
            value = generate_value(service, metric)
            send_metric(service, metric, value)
            time.sleep(0.1)

    print("Started Chaos-Aware OTEL Load Generator")

    # Start chaos status poller
    chaos_thread = threading.Thread(target=check_chaos_status, daemon=True)
    chaos_thread.start()

    # Start metric generator threads
    threads = []
    for i in range(7):
        t = threading.Thread(target=generator_thread, daemon=True)
        t.start()
        threads.append(t)

    # Periodic status logging
    try:
        while True:
            with chaos_lock:
                active = {k: v for k, v in chaos_state.items() if v.get("active")}
            if active:
                print(f"Active chaos: {json.dumps({k: v.get('type') for k, v in active.items()})}")
            time.sleep(30)
    except KeyboardInterrupt:
        print("Stopped")

---
# Load Generator Pod
apiVersion: v1
kind: Pod
metadata:
  name: otel-load-generator
  namespace: loadgen
spec:
  containers:
  - name: generator
    image: python:3.11-slim
    command: ["python", "/generator/generator.py"]
    volumeMounts:
    - name: script
      mountPath: /generator
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 256Mi
  volumes:
  - name: script
    configMap:
      name: load-generator-script
      defaultMode: 0755
  restartPolicy: Always
