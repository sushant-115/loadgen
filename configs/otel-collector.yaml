receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 5s
    send_batch_size: 512

exporters:
  prometheus:
    endpoint: 0.0.0.0:8889

  otlp/jaeger:
    endpoint: jaeger:4317
    tls:
      insecure: true

  loki:
    endpoint: http://loki:3100/loki/api/v1/push

  otlp/infrasage:
    endpoint: 172.31.36.245:32186
    tls:
      insecure: true

  debug:
    verbosity: basic

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/jaeger, otlp/infrasage]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, otlp/infrasage]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [loki, otlp/infrasage]
