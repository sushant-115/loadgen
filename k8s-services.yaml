---
# ConfigMap for application build (using multi-stage Dockerfile)
# This will be built from the loadgen source code
# Services read this to determine their configuration

---
# Gateway Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway
  namespace: loadgen
spec:
  replicas: 2
  selector:
    matchLabels:
      app: gateway
  template:
    metadata:
      labels:
        app: gateway
    spec:
      serviceAccountName: loadgen
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.loadgen.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-otel
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z otel-collector.loadgen.svc.cluster.local 4318; do echo waiting for otel; sleep 2; done']
      containers:
      - name: gateway
        image: loadgen:latest
        imagePullPolicy: Never
        args: ["/app/gateway"]
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.loadgen.svc.cluster.local:4317"
        - name: OTEL_INSECURE
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: gateway
        - name: SERVICE_PORT
          value: "8080"
        - name: AUTH_SERVICE_URL
          value: "http://auth-service.loadgen.svc.cluster.local:8080"
        - name: USER_SERVICE_URL
          value: "http://user-service.loadgen.svc.cluster.local:8080"
        - name: ORDER_SERVICE_URL
          value: "http://order-service.loadgen.svc.cluster.local:8080"
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Gateway Service
apiVersion: v1
kind: Service
metadata:
  name: gateway
  namespace: loadgen
spec:
  selector:
    app: gateway
  type: LoadBalancer
  ports:
  - port: 8080
    targetPort: 8080

---
# Auth Service Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  namespace: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      serviceAccountName: loadgen
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.loadgen.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      - name: wait-for-redis
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z redis.loadgen.svc.cluster.local 6379; do echo waiting for redis; sleep 2; done']
      containers:
      - name: auth-service
        image: loadgen:latest
        imagePullPolicy: Never
        args: ["/app/auth"]
        ports:
        - containerPort: 8081
        env:
        - name: OTEL_EXPORTER_OTLP_ENDPOINT
          value: "otel-collector.loadgen.svc.cluster.local:4317"
        - name: OTEL_INSECURE
          value: "true"
        - name: OTEL_SERVICE_NAME
          value: auth-service
        - name: SERVICE_PORT
          value: "8081"
        - name: POSTGRES_DSN
          value: "postgres://loadgen:loadgen@postgres.loadgen.svc.cluster.local:5432/loadgen?sslmode=disable"
        - name: REDIS_URL
          value: "redis://redis.loadgen.svc.cluster.local:6379/0"
        livenessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /health
            port: 8081
          initialDelaySeconds: 5
          periodSeconds: 5

---
# Auth Service
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  namespace: loadgen
spec:
  selector:
    app: auth-service
  ports:
  - port: 8080
    targetPort: 8081

