---
# Traffic Generator Deployment (Simulates production traffic)
apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: loadgen
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      serviceAccountName: loadgen
      initContainers:
      - name: wait-for-gateway
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z gateway.loadgen.svc.cluster.local 8080; do echo waiting for gateway; sleep 2; done']
      containers:
      - name: traffic-generator
        image: loadgen:latest
        imagePullPolicy: Never
        args: ["/app/traffic"]
        env:
        - name: TARGET_URL
          value: "http://gateway.loadgen.svc.cluster.local:8080"
        - name: REQUESTS_PER_SECOND
          value: "10"
        resources:
          requests:
            cpu: 500m
            memory: 256Mi
          limits:
            cpu: 1000m
            memory: 512Mi
